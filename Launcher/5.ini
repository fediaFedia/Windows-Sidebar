[Metadata]
Name=App Launcher Gadget | Style 5
Config=Vista Rainbar | Launcher
Description=Shows shortcuts to applications for quick launching. | This style has 2 rows and 3 columns.
Instructions=Set your preferred applications using the configuration tool.
Version=5.0
Tags=Gadget | Vista Rainbar | Launcher
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Background=Lanceur6b.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Set][!ShowMeter More][!ShowMeter Back][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Set][!HideMeter More][!HideMeter Back][!HideMeter Close][!Redraw]

[Variables]
Soft1.icon=Soft1.png
Soft1=explorer.exe /root,,::{20D04FE0-3AEA-1069-A2D8-08002B30309D}
Soft2.icon=Soft2.png
Soft2=notepad.exe
Soft3.icon=Soft3.png
Soft3=firefox.exe
Soft4.icon=Soft4.png
Soft4=mspaint.exe
Soft5.icon=Soft5.png
Soft5=calc.exe
Soft6.icon=Soft6.png
Soft6=wmplayer.exe
@Include=settings.inc

