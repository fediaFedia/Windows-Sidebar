[Metadata]
Name=Analog Clock Gadget | Simple
Config=Vista Rainbar | Clock | Normal
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com



[img]
Meter=IMAGE
w=130
h=135
ImageName=bezel.png
x=10

[zone]
Meter=IMAGE
w=125
h=125
x=10
y=4
ImageName=#currentpath#zones\TCG_01r_night0000.png

[fade]
Meter=IMAGE
w=125
h=124
x=11
y=2
ImageName=#currentpath#day2night_transparency_small\0170.png

[3]
Meter=IMAGE
w=122
h=122
x=12
y=4
ImageName=tickmarks_night.png

[2]
Meter=IMAGE
w=125
h=125
x=11
y=3
ImageName=rim.png




[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=140

MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Back][!ShowMeter Close][!ShowMeter Plus][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Back][!HideMeter Close][!HideMeter Plus][!Redraw]

[Variables]
Value=
@Include=settings.inc

[MeasureTime]
Measure=Time

[MeasureTime2]
Measure=Time
Format=%d

[1]
Measure=Time
Format=%H:%M:%S

[2]
Measure=Time
Format=%I:%M %p

[3]
Measure= Plugin
Plugin=Plugins\SysInfo.dll
SysInfoType=HOST_NAME

[4]
Measure=Time
Format=%Z

###

[Txt]
Meter=STRING
MeasureName=#Value#
X=74
Y=80
H=16
W=74
FontFace=Arial Narrow
FontColor=40,40,40
FontSize=9
StringAlign=CENTER
StringStyle=BOLD
Antialias=1
Clipstring=1

[HoursShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=heureShwSimplee.png
X=75
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=43200
OffsetX=6
OffsetY=64

[Hours]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=heureSimple.png
X=73
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=43200
OffsetX=6
OffsetY=64

[MinutesShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=minuteShwSimplee.png
X=75
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=3600
OffsetX=6
OffsetY=64

[Minutes]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=minuteSimple.png
X=73
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=3600
OffsetX=6
OffsetY=64

[Point]
Meter=IMAGE
ImageName=pointSimple.png
X=68
Y=-1

[SecondesShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=secondeShwSimplee.png
X=75
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=6
OffsetY=64

[Secondes]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=secondeSimple.png
X=73
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=6
OffsetY=64

[Glass]
Meter=IMAGE
ImageName=glassSimple.png
X=0
Y=0

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXSRL.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[Plus]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=120
Y=21
ButtonCommand=!execute ["#CURRENTPATH#ClockConfig.exe"]
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=120
Y=42
ButtonCommand=!ActivateConfig "#Currentconfig#"
Hidden=1

[Back]
Meter=BUTTON
ButtonImage=#@#img\Back.png
X=120
Y=63
ButtonCommand=!ActivateConfig "#Currentconfig#"
Hidden=1
