[Metadata]
Name=Digital Clock Gadget | Style 1
Config=Vista Rainbar | Clock | Digital
Description=Display the time in digital form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=60000


[Variables]
@include=UserVariables.inc
Launch=0

[img]
Meter=IMAGE

imagename=Digital.png
ImageTint=#Color#

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=100
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]

[MeasureTime]
Measure=Time

[MeasureTimeH]
Measure=Time
Format="#Use_12H_Format#"

[MeasureTimeM]
Measure=Time
Format="%M"

[MeasureTimeP]
Measure=Time
Format="%p"

[MeasureTrigger]
Measure=Calc
Formula=(MeasureTimeM = 0 ? 1 : 0)
IfCondition=(MeasureTimeM = 1)
IfTrueAction=[!Play "#@#tick.wav"]
DynamicVariables=1
Disabled=#Hourly_Chime#

[am]
Meter=IMAGE
ImageName=[MeasureTimeP].png
X=20
Y=54
ImageTint=#Digit_Color#
w=13
Hidden=#Show_AM_PM#


[Points]
Meter=IMAGE
ImageName=digicn.png
X=61
Y=33
ImageTint=#Digit_Color#

[TimeH]
MeasureName=MeasureTimeH
Meter=BITMAP
X=22
Y=29
BitmapImage=Chiffres.png
BitmapFrames=10
BitmapExtend=1
BitmapAlign=LEFT
BitmapSeparation=0
BitmapDigits=2
Hidden=0
ImageTint=#Digit_Color#
[TimeM]
MeasureName=MeasureTimeM
Meter=BITMAP
X=71
Y=29
BitmapImage=Chiffres.png
BitmapFrames=10
BitmapExtend=1
BitmapAlign=LEFT
BitmapSeparation=0
BitmapDigits=2
Hidden=0
ImageTint=#Digit_Color#
###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXS.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=118
Y=21
ButtonCommand=!execute ["#@#\Config.exe" "#CURRENTCONFIG#" "#currentpath#\" "#CURRENTFILE#" "#programpath#\" "#CURRENTCONFIGX#" "#CURRENTCONFIGY#"][!WriteKeyValue Variables Launch 0]
Hidden=1
