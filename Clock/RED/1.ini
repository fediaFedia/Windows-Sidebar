[Metadata]
Name=RED Clock Gadget | Style 1
Config=Vista Rainbar | Clock | RED
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=60000

[img]
Meter=IMAGE
w=130
h=130
ImageName=modern.png

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Close][!Redraw]

[MeasureTime]
Measure=Time

[HoursShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=..\Normal\HourShwModern.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=43200
OffsetX=6
OffsetY=64

[Hours]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=..\Normal\HoursModern.png
X=63
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=43200
OffsetX=6
OffsetY=64

[MinutesShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=..\Normal\minuteShwModern.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=3600
OffsetX=6
OffsetY=64

[Minutes]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=..\Normal\MinuteModern.png
X=63
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=3600
OffsetX=6
OffsetY=64



[SecondesShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=..\Normal\secondeShwModern.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=6
OffsetY=64

[Secondes]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=modern_s.png
X=63
Y=63
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=6
OffsetY=64

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuX.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1
