[Metadata]
Name=Battery Gadget | Style 1
Config=Vista Rainbar | Battery
Description=Displays the status of your battery.
Version=5.0
Tags=Gadget | Vista Rainbar | Battery | System
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=1000
UpdateDivider=300

[img]
Meter=IMAGE
imagename=Fond.png

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]

[Variables]
FontName=Segoe UI
FontName2=Microsoft Sans Serif
TxtColor=255,255,255,200
ShwColor=0,0,0,200

###

[MeasureAC]
Measure=Plugin
PlugIn=Plugins\PowerPlugin.dll
PowerState=ACLINE
IfAboveValue=0
IfAboveAction=!execute [!HideMeter Life3][!HideMeter Life4][!ShowMeter Icon][!ShowMeter Life][!ShowMeter Life2][!Redraw]

[MeasurePercent]
Measure=Plugin
PlugIn=Plugins\PowerPlugin.dll
PowerState=PERCENT

###

[Style]
FontFace=#FontName2#
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1

###

[Battery]
Meter=BITMAP
MeasureName=MeasurePercent
X=4
Y=8
BitmapImage=batterie.png
BitmapFrames=4
BitmapZeroFrame=1

[Icon]
Meter=IMAGE
ImageName=Batterie+.png
X=4
Y=8
W=48
H=48
Hidden=1

[Percent]
Meter=STRING
MeasureName=MeasurePercent
X=87
Y=15
FontColor=#ShwColor#
FontFace=#FontName#
FontSize=12
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="%1%"

[Percent2]
Meter=STRING
MeasureName=MeasurePercent
X=1r
Y=-1r
FontColor=#TxtColor#
FontFace=#FontName#
FontSize=12
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="%1%"

[Life]
Meter=STRING
X=86
Y=36
W=68
FontColor=#ShwColor#
FontFace=Calibri
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="Charging"
Hidden=1

[Life2]
Meter=STRING
X=1r
Y=-1r
W=68
FontColor=#TxtColor#
FontFace=Calibri
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="Charging"
Hidden=1

[Life3]
Meter=STRING
X=86
Y=36
W=68
FontColor=#ShwColor#
FontFace=Calibri
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="In use"

[Life4]
Meter=STRING
X=1r
Y=-1r
W=68
FontColor=#TxtColor#
FontFace=Calibri
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1
Text="In use"

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=118
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Battery" "2.ini"
Hidden=1
