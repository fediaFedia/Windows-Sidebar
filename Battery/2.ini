[Metadata]
Name=Battery Gadget | Style 2
Config=Vista Rainbar | Battery
Description=Displays the status of your battery.
Version=5.0
Tags=Gadget | Vista Rainbar | Battery | System
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=1000
UpdateDivider=300

[img]
Meter=IMAGE
imagename=Fond2.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]

[Variables]
FontName=Segoe UI
FontName2=Microsoft Sans Serif
TxtColor=255,255,255,200
ShwColor=0,0,0,200

###

[MseAc]
Measure=Plugin
PlugIn=Plugins\PowerPlugin.dll
PowerState=ACLINE
IfAboveValue=0
IfAboveAction=!execute [!ShowMeter AC][!ShowMeter AC2]

[MeasurePercent]
Measure=Plugin
PlugIn=Plugins\PowerPlugin.dll
PowerState=PERCENT

###

[Style]
FontFace=#FontName#
FontSize=8
StringAlign=CENTER
StringStyle=BOLD
AntiAlias=1

###

[Battery]
Meter=BAR
MeasureName=MeasurePercent
X=3
Y=10
H=41
W=115
BarColor=13,123,15,220
BarOrientation=HORIZONTAL

[Glass]
Meter=IMAGE
ImageName=Glass.png
X=-7
Y=0

[Percent]
Meter=STRING
MeasureName=MeasurePercent
X=59
Y=12
FontColor=#ShwColor#
MeterStyle=Style
FontSize=20
Text="%1%"

[Percent2]
Meter=STRING
MeasureName=MeasurePercent
X=1r
Y=-1r
FontColor=#TxtColor#
MeterStyle=Style
FontSize=20
Text="%1%"

[AC]
Meter=STRING
X=105
Y=35
FontColor=#ShwColor#
MeterStyle=Style
Text="AC"
Hidden=1

[AC2]
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
MeterStyle=Style
Text="AC"
Hidden=1

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=118
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Battery" "1.ini"
Hidden=1
