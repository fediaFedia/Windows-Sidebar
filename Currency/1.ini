[Metadata]
Name=Buy RED Gadget | Style 1
Config=Vista Rainbar | Clock | RED
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=balazslaci, legace@inbox.com

Update=361000


[Variables]
FontName=Segoe UI
FontSize=8
@include=UserVariables.inc

[img]
Meter=IMAGE
w=130
h=83
ImageName=Currency.png
LeftMouseUpAction=!execute [""]
MouseActionCursor=1 

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter More][!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter More][!HideMeter Menu][!HideMeter Close][!Redraw]

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXS.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1


[More]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=120
Y=21
ButtonCommand=!execute ["#@#\Config.exe" "#CURRENTCONFIG#" "#currentpath#\" "#CURRENTFILE#" "#programpath#\" "#CURRENTCONFIGX#" "#CURRENTCONFIGY#"]
Hidden=1


;----------------------------------------

[Measurecurrency]
Measure=Plugin
Plugin=Plugins\WebParser.dll
Url=http://www.ecb.int/stats/eurofxref/eurofxref-hist.xml
RegExp="(?siU)<Cube time="(.*)">.*<Cube currency="#Currency1#" rate="(.*)"/>.*<Cube currency="#Currency2#" rate="(.*)"/>"
UpdateRate=1800
FinishAction=!Update "#CURRENTCONFIG#"

[MeasureDate]
Measure=Plugin
Plugin=Plugins\WebParser.dll
URL=[Measurecurrency]
StringIndex=1
UpdateRate=1

[MeasureCurrency1]
Measure=Plugin
Plugin=Plugins\WebParser.dll
URL=[Measurecurrency]
StringIndex=2
UpdateRate=1

[MeasureCurrency2]
Measure=Plugin
Plugin=Plugins\WebParser.dll
URL=[Measurecurrency]
StringIndex=3
UpdateRate=1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=10
Y=12
StringStyle=BOLD
FontSize=8
FontColor=255,255,255,255
AntiAlias=1
Text=Date: %1
InlineSetting=Shadow | 0 | 0 | 2 | 0,0,0,100


[MeterCurrency1]
Meter=String
MeasureName=MeasureCurrency1
X=10
Y=5*R
FontSize=#FontSize#
FontColor=255,255,255,255
AntiAlias=1
Text=1 EUR = %1 #Currency1#
InlineSetting=Shadow | 0 | 0 | 2 | 0,0,0,100

[MeterCurrency2]
Meter=String
MeasureName=MeasureCurrency2
X=10
Y=3*R
FontSize=#FontSize#
FontColor=255,255,255,255
AntiAlias=1
Text=1 EUR = %1 #Currency2#
InlineSetting=Shadow | 0 | 0 | 2 | 0,0,0,100


