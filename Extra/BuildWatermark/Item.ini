[Rainmeter]
Group=Gadget | Vista Rainbar
Group=LonghornSidebar
Update=-1
Author=legace@inbox.com
MouseActionCursor=0
MiddleMouseUpAction=!DeactivateConfig
OnRefreshAction=[!Draggable 0][!ZPos -1][!Move (#screenareawidth#-403*1) (#workareaheight#-43*1)] 

[Metadata]
Version=5.0
Information=Build Watermark
License=Creative Commons Attribution-Noncommercial-Share Alike 3.0 License

[Variables]
OSVersion=Windows Vista(TM) Beta 2
BuildNumber=5212.winmain.050726-1915


[Te]
Antialias=1
FontFamily=Segoe UI
FontSize=(10*1)
FontColor=255,255,255
Solidcolor=0,0,0,1
x=(400*1)
y=0
w=(400*1)
stringAlign=right


[Build]
Meter=String
MeterStyle=Te
Text=#OSVersion#


[Build2]
Meter=String
MeterStyle=Te
y=(3*1)R
Text=For testing purposes only. Build #BuildNumber#
LeftMouseUpAction=!CommandMeasure InputNotes1 "ExecuteBatch 1"

[InputNotes1]
Measure=Plugin
Plugin=InputText.dll
SolidColor=#colorskin#
W=(400*1)
H=(35*1)
X=0
Y=0
Command1=[!WriteKeyValue Variables BuildNumber "$UserInput$"][!Refresh "#currentconfig#"] 
DefaultValue="#BuildNumber#"
StringStyle=NORMAL
AntiAlias=1
StringAlign=right
FontFace=Segoe UI
FontColor=0,0,0
FontSize=(10*1)
FocusDismiss=1

