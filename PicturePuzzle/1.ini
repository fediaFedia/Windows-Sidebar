[Metadata]
Name=Buy RED Gadget | Style 1
Config=Vista Rainbar | Clock | RED
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=-1

[Variables]
Launch=0
@include=UserVariables.inc

[CalcSize]
Measure=Calc
Formula=108 / #Puzzle_Difficulty#

[CalcPos]
Measure=Calc
Formula=#Launch#
IfCondition=CalcPos = 1
IfTrueAction=[!WriteKeyValue img ToolTipText ""]["#currentpath#\SliderPuzzle.exe" #CurrentConfigX# #CurrentConfigY# 10 20 #Puzzle_Difficulty# ".\Variants\#Puzzle#.png" [CalcSize]][!WriteKeyValue Variables Launch 0][!Redraw]
DynamicVariables=1


[Numbers]
Measure=String
String=#Puzzle#
IfMatch=^11$
IfMatchAction=[!SetVariable  Puzzle_Difficulty 4][!WriteKeyValue Variables Puzzle_Difficulty 4 "UserVariables.inc"][!Update]

[bg]
Meter=IMAGE
w=130
h=138
ImageName=Picture Puzzle.png
MouseActionCursor=1 
DynamicVariables=1
ToolTipText=

[imgE]
Meter=IMAGE
w=108
h=108
x=10
y=20
ImageName=./Variants/#Puzzle#.png
MouseActionCursor=1 
DynamicVariables=1
ToolTipText=

[img]
Meter=IMAGE
w=108
h=108
x=10
y=20
ImageName=#Puzzle_Difficulty#.png
LeftMouseUpAction=!execute [!WriteKeyValue Variables Launch 1][!Refresh]
MouseActionCursor=1 
DynamicVariables=1
ToolTipText=

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter Plus][!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Plus][!HideMeter Menu][!HideMeter Close][!WriteKeyValue Variables Launch 0][!Redraw]

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXS.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[Plus]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=120
Y=21
ButtonCommand=!execute ["#@#\Config.exe" "#CURRENTCONFIG#" "#currentpath#\" "#CURRENTFILE#" "#programpath#\" "#CURRENTCONFIGX#" "#CURRENTCONFIGY#"][!WriteKeyValue Variables Launch 0]
Hidden=1
