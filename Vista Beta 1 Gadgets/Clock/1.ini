[Metadata]
Name=Analog Clock Gadget | Antique
Config=Vista Rainbar | Clock | Normal
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

ContextTitle=Settings
ContextAction=!execute ["#@#\Config.exe" "#CURRENTCONFIG#" "#currentpath#\" "#CURRENTFILE#" "#programpath#\" "#CURRENTCONFIGX#" "#CURRENTCONFIGY#"]
ContextTitle2=Close
ContextAction2=!DeactivateConfig
ContextTitle3=----
ContextAction3=[]
ContextTitle4=More Actions
ContextAction4=[!SkinMenu]
Update=#Show_Seconds#000

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Back][!ShowMeter Close][!ShowMeter Plus][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Back][!HideMeter Close][!HideMeter Plus][!Redraw]

[Variables]
Value=
@Include=UserVariables.inc

[img]
Meter=IMAGE
ImageName=#currentpath#Variants\#Clock_Style#.png
w=130
h=130

[Date]
Measure=Time
Format=%d

[MeasureTime]
Measure=Time
Timezone=#Time_zone#

[DateBg]
Meter=IMAGE
imagename=#Clock_Style#Date.png
X=78
Y=56
Hidden=#Show_Date#


[Txt]
Meter=STRING
MeasureName=Date
X=91
Y=58
H=16
W=64
FontFace=Segoe UI
FontColor=125,65,65
FontSize=8
StringAlign=CENTER
Hidden=#Show_Date#
Antialias=1
Clipstring=1

[Hours]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=HeureNB#Clock_Style#.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=43200
OffsetX=6
OffsetY=64



[MinutesShw]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=MinuteNB#Clock_Style#.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=3600
OffsetX=6
OffsetY=64



[Secondes]
MeasureName=MeasureTime
Meter=ROTATOR
ImageName=SecondeSimple#Show_Seconds#.png
X=65
Y=65
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=6
OffsetY=64




[Close]
Meter=BUTTON
ButtonImage=#@#\Graphics\Sidebar\Dropdown.png
X=130
Y=0
ButtonCommand=!SkinCustomMenu
Hidden=1

