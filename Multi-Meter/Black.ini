[Metadata]
Name=Multi-Meter Gadget | Black
Config=Vista Rainbar | Multi-Meter
Description=Displays current CPU, RAM, and SWAP usage.
Version=5.0
Tags=Gadget | Vista Rainbar | System | CPU | RAM
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com


[img]
Meter=IMAGE
imagename=Black.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=138
h=100
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]
Update=2000

[Variables]
FontName=Segoe UI
TxtColor=255,255,255,235
Shw_Color=0,0,0,200

###

[MeasureCPU]
Measure=CPU

[MeasureCPUMhz]
Measure=Plugin
Plugin=Plugins\PowerPlugin.dll
PowerState=MHZ

[MeasureRAM]
Measure=PhysicalMemory
Substitute="G":"GB","M":"MB"

[MeasureRAMTotal]
Measure=PhysicalMemory
Total=1
Substitute="G":"GB","M":"MB"

[MeasureSWAP]
Measure=SwapMemory
Substitute="G":"GB","M":"MB"

[MeasureSWAPTotal]
Measure=SwapMemory
Total=1
Substitute="G":"GB","M":"MB"

###

[CPU]
MeasureName=MeasureCPU
Meter=BAR
BarImage=Bleu.png
BarOrientation=HORIZONTAL
X=43
Y=25

[CPUPercentShw]
MeasureName=MeasureCPU
Meter=STRING
X=83
Y=22
FontColor=#Shw_Color#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
AntiAlias=1

[CPUPercent]
MeasureName=MeasureCPU
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
AntiAlias=1

[CPUMHzShw]
Meter=STRING
MeasureName=MeasureCPUMHz
X=40
Y=11
FontColor=#Shw_Color#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
Text=%1 MHz

[CPUMHz]
Meter=STRING
MeasureName=MeasureCPUMHz
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
Text=%1 MHz

[CPUImage]
Meter=IMAGE
ImageName=Cpu.png
X=5
Y=5
H=38
W=38
LeftMouseUpAction=!Execute [taskmgr.exe]

[CPUTxtShw]
Meter=STRING
X=9
Y=17
FontColor=#Shw_Color#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
Text=CPU

[CPUTxt]
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
Text=CPU

[RAMBar]
MeasureName=MeasureRAM
Meter=BAR
BarImage=Vert.png
BarOrientation=HORIZONTAL
X=43
Y=54

[RAMPercentShw]
MeasureName=MeasureRAM
Meter=STRING
X=83
Y=51
FontColor=#Shw_Color#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
Percentual=1
AntiAlias=1

[RAMPercent]
MeasureName=MeasureRAM
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
Percentual=1
AntiAlias=1

[RAMShw]
Meter=STRING
MeasureName=MeasureRAM
MeasureName2=MeasureRAMTotal
X=7
Y=40
FontColor=#Shw_Color#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=0
Text=RAM    %1/%2

[RAM]
Meter=STRING
MeasureName=MeasureRAM
MeasureName2=MeasureRAMTotal
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=bold
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=0
Text=RAM    %1/%2

[RAMImage]
Meter=IMAGE
ImageName=Ram.png
X=4
Y=39
H=40
W=40

[SWAPBar]
MeasureName=MeasureSWAP
Meter=BAR
BarImage=Vert.png
BarOrientation=HORIZONTAL
X=43
Y=83

[SWAPPercentShw]
MeasureName=MeasureSWAP
Meter=STRING
X=83
Y=80
FontColor=#Shw_Color#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
Percentual=1
AntiAlias=1

[SWAPPercent]
MeasureName=MeasureSWAP
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
Postfix=%
NumOfDecimals=0
Percentual=1
AntiAlias=1

[SWAPShw]
Meter=STRING
MeasureName=MeasureSWAP
MeasureName2=MeasureSWAPTotal
X=7
Y=69
FontColor=#Shw_Color#
StringStyle=BOLD
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=0
Text=SWAP  %1/%2

[SWAP]
Meter=STRING
MeasureName=MeasureSWAP
MeasureName2=MeasureSWAPTotal
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=7
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumOfDecimals=0
Text=SWAP  %1/%2

[SWAPImage]
Meter=IMAGE
ImageName=Ram.png
X=4
Y=68
H=40
W=40

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=118
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Multi-Meter" "Glass.ini"
Hidden=1
