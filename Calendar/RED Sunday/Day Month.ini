[Metadata]
Name=RED Calendar Gadget (Sunday) | Day + Month
Config=Vista Rainbar | Calendar | RED Sunday
Description=Shows the the date.
Version=5.0
Tags=Gadget | Vista Rainbar | Calendar
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

BackgroundMode=0
MouseOverAction=!execute [!ShowMeter MeterMenu][!ShowMeter MeterMore][!ShowMeter MeterClose][!Redraw]
MouseLeaveAction=!execute [!HideMeter MeterMenu][!HideMeter MeterMore][!HideMeter MeterClose][!Redraw]

[Variables]
FontName=Segoe UI
TxtColor=255,255,255
TxtColor2=0,0,0,150
ShwColor=0,0,0
ShwColor2=0,0,0,80
HideAll=[!HideMeter LblDayA1][!HideMeter LblDayA2][!HideMeter LblDayA3][!HideMeter LblDayA4][!HideMeter LblDayA5][!HideMeter LblDayA6][!HideMeter LblDayA7][!HideMeter LblDayB1][!HideMeter LblDayB2][!HideMeter LblDayB3][!HideMeter LblDayB4][!HideMeter LblDayB5][!HideMeter LblDayB6][!HideMeter LblDayB7][!HideMeter LblDayC1][!HideMeter LblDayC2][!HideMeter LblDayC3][!HideMeter LblDayC4][!HideMeter LblDayC5][!HideMeter LblDayC6][!HideMeter LblDayC7][!HideMeter LblDayD1][!HideMeter LblDayD2][!HideMeter LblDayD3][!HideMeter LblDayD4][!HideMeter LblDayD5][!HideMeter LblDayD6][!HideMeter LblDayD7][!HideMeter LblDayE1][!HideMeter LblDayE2][!HideMeter LblDayE3][!HideMeter LblDayE4][!HideMeter LblDayE5][!HideMeter LblDayE6][!HideMeter LblDayE7][!HideMeter LblDayF1][!HideMeter LblDayF2]
