[Metadata]
Name=Buy RED Gadget | Style 1
Config=Vista Rainbar | Clock | RED
Description=Display the time in analog form.
Version=5.0
Tags=Gadget | Vista Rainbar | Clock | Time
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=-1

[img]
Meter=IMAGE
w=138
h=168
ImageName=Contacts.png
## LeftMouseUpAction=!execute ["shell:contacts"]
MouseActionCursor=1 

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter Plus][!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Plus][!HideMeter Menu][!HideMeter Close][!Redraw]

###

[Variables]
@include=UserVariables.inc
Launch=0

[Txt]
X=r
Y=2R
H=18
W=100
FontFace=Segoe UI
FontColor=0,0,0
FontSize=10
StringAlign=LEFT

Antialias=1
Clipstring=1

[1]
Meter=String
X=12
Y=12
StringStyle=BOLD
MeterStyle=Txt
Text=#Contact_Name_1#
LeftMouseUpAction=!execute ["#Contact_Action_1#"]

[2]
Meter=String
MeterStyle=Txt
Text=#Contact_Name_2#
LeftMouseUpAction=!execute ["#Contact_Action_2#"]

[3]
Meter=String
MeterStyle=Txt
Text=#Contact_Name_3#
LeftMouseUpAction=!execute ["#Contact_Action_3#"]

[4]
Meter=String
MeterStyle=Txt
Text=#Contact_Name_4#
LeftMouseUpAction=!execute ["#Contact_Action_4#"]

[5]
Meter=String
MeterStyle=Txt
Text=#Contact_Name_5#
LeftMouseUpAction=!execute ["#Contact_Action_5#"]



[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXS.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1


[Plus]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=120
Y=21
ButtonCommand=!execute ["#@#\Config.exe" "#CURRENTCONFIG#" "#currentpath#\" "#CURRENTFILE#" "#programpath#\" "#CURRENTCONFIGX#" "#CURRENTCONFIGY#"][!WriteKeyValue Variables Launch 0]
Hidden=1
[Variables]
Launch=0
