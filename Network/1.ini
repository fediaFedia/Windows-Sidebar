MeasureName=MeasureOut
X=120
Y=25
FontColor=#ShwColor#
StringStyle=NORMAL
FontSize=9
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
Postfix=#SpeedUnitName#

[NetOut2]
Meter=STRING
MeasureName=MeasureOut
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=NORMAL
FontSize=9
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
Postfix=#SpeedUnitName#

[OutText]
Meter=STRING
X=55
Y=25
FontColor=#ShwColor#
StringStyle=BOLD
FontSize=9
StringAlign=LEFT
