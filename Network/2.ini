X=55
Y=13
FontColor=#ShwColor#
StringStyle=BOLD
FontSize=8
StringAlign=LEFT
FontFace=#FontName2#
AntiAlias=1
Text="D:"

[InText2]
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=8
StringAlign=LEFT
