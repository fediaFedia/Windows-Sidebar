[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=-1

[Variables]
Launch=0

[CalcPos]
Measure=Calc
Formula=#Launch#
IfCondition=CalcPos = 1
IfTrueAction=["#skinspath#Vista Rainbar\Vista Beta 2 Gadgets\Number Puzzle\SliderPuzzle.exe" #CurrentConfigX# #CurrentConfigY# 0 13 4 "Flowers.jpg" 32][!WriteKeyValue Variables Launch 0][!Redraw]


[img]
Meter=IMAGE
ImageName=Item.png
LeftMouseUpAction=!execute [!WriteKeyValue Variables Launch 1][!Refresh]
MouseActionCursor=1 
DynamicVariables=1
ToolTipText=Click to Start

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Solid2][!HideMeter Menu][!HideMeter Close][!WriteKeyValue Variables Launch 0][!Redraw]



###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuX.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1
