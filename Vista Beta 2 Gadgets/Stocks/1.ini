[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Update=-1

[img]
Meter=IMAGE
ImageName=Item.png
LeftMouseUpAction=!execute ["calc.exe"]
MouseActionCursor=1 

[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=140
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Close][!Redraw]

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuX.png
X=120
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=120
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[Txt]
Meter=STRING
Text=Getting data...
X=64
Y=72
H=16
W=100
FontFace=Segoe UI
FontColor=240,230,210
FontSize=9
StringAlign=CENTER
StringStyle=BOLD
Antialias=1
Clipstring=1
ToolTipText=This Widget is currently only cosmetic :)