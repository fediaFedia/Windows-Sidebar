[Metadata]
Name=CPU Meter | Style 1
Config=Vista Rainbar | CPU Meter
Description=Displays the CPU and RAM usage.
Version=5.0
Tags=Gadget | Vista Rainbar | CPU | RAM | System
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com


[img]
Meter=IMAGE

imagename=CPUMeterNoir.png


[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=100
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Plus][!ShowMeter More][!ShowMeter Back][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Plus][!HideMeter More][!HideMeter Back][!HideMeter Close][!Redraw]

[Variables]
FontName=Segoe UI
TxtColor=238,0,0,235
Shw_Color=0,0,0,200
AntiAlias=1

###

[MeasureCPU]
Measure=CPU

###

[CPU]
MeasureName=MeasureCPU
Meter=ROTATOR
X=41
Y=54
ImageName=RotatorNoir.png
StartAngle=1
RotationAngle=4.2832
OffsetX=5
OffsetY=30

[CPU2]
MeasureName=MeasureCPU
Meter=STRING
X=43
Y=76
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=8
StringAlign=CENTER
FontFace=#FontName#
Postfix="%"
AntiAlias=1

---
[MeasurePhysUsed]
Measure=PhysicalMemory

[UsedPhysMemBar]
MeasureName=MeasurePhysUsed
Meter=ROTATOR
X=95
Y=35
ImageName=RotatorRAMNoir.png
StartAngle=1
RotationAngle=4.2832
OffsetX=4
OffsetY=22

[PhysMemUsed]
Meter=string
MeasureName=MeasurePhysUsed
X=97
Y=43
FontColor=#TxtColor#
StringStyle=bold
FontSize=7
StringAlign=CENTER
FontFace=#FontName#
AntiAlias=1
Postfix="%"
AutoScale=1
Percentual=1

---

---
[Menu]
Meter=IMAGE
ImageName=#@#img\MenuX.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

