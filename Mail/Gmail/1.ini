[Metadata]
Name=Mail Gadget (Gmail) | Style 1
Config=Vista Rainbar | Mail | Gmail
Description=Alerts you about unread messages in your Gmail inbox.
Version=5.0
Tags=Gadget | Vista Rainbar | Mail
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com

Background=..\img\Fond.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Set][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Set][!HideMeter Close][!Redraw]
Update=1000

[Variables]
TextG=<text on gadget>
@Include=..\settings.inc
@Include2=..\..\RSS\ExtendedSubstitution.inc
Client=www.google.com/mail
FontName=Segoe UI
TxtColor=255,255,255,245
ShwColor=0,0,0,245

###

[MeasureGMail]
Measure=Plugin
Plugin=Plugins\WebParser.dll
Url=https://#UserG#:#PasswordG#@gmail.google.com/gmail/feed/atom
RegExp="(?siU)<fullcount>(.*)</fullcount>(?(?=.*<title>).*<title>(.*)</title>.*<name>(.*)</name>)"
Codepage=0
Download=1
UpdateRate=300
StringIndex=4

[MeasureMail]
Measure=Plugin
Plugin=Plugins\WebParser.dll
Url=[MeasureGMail]
StringIndex=1
UpdateRate=1
IfAboveValue=0
IfAboveAction=!execute [!HideMeter NoMail][!ShowMeter Title][!ShowMeter Address][PLAY Notify.wav]
IfBelowValue=1
IfBelowAction=!execute [!HideMeter Title][!HideMeter Address][!ShowMeter NoMail]

[MeasureTitle]
Measure=Plugin
Plugin=Plugins\WebParser.dll
Url=[MeasureGMail]
StringIndex=2
Substitute=#Substitute#

[MeasureAddress]
Measure=Plugin
Plugin=Plugins\WebParser.dll
Url=[MeasureGMail]
StringIndex=3
Substitute=#Substitute#

###

[NewShw]
Meter=STRING
MeasureName=MeasureMail
X=104
Y=67
FontFace=Segoe UI
FontColor=#ShwColor#
StringStyle=bold
fontSize=17
StringAlign=CENTER
Antialias=1

[New]
Meter=STRING
MeasureName=MeasureMail
X=1r
Y=-1r
FontFace=Segoe UI
FontColor=#TxtColor#
StringStyle=bold
fontSize=17
StringAlign=CENTER
Antialias=1

[Address]
Meter=STRING
MeasureName=MeasureAddress
X=73
Y=25
W=80
H=15
FontFace=Segoe UI
FontColor=#ShwColor#
StringStyle=BOLD
fontSize=8
StringAlign=CENTER
Antialias=1
Clipstring=1
Angle=0.26
Hidden=1

[Title]
Meter=STRING
MeasureName=MeasureTitle
X=68
Y=40
W=80
H=45
FontFace=Segoe UI
FontColor=#ShwColor#
StringStyle=normal
fontSize=8
StringAlign=CENTER
Antialias=1
Clipstring=1
Angle=0.26
Hidden=1

[NoMail]
Meter=STRING
X=70
Y=40
W=80
H=30
FontFace=Segoe UI
FontColor=#ShwColor#
StringStyle=normal
fontSize=8
StringAlign=CENTER
Antialias=1
Clipstring=1
Angle=0.26
Text=You have no new mail.

[Icone]
Meter=IMAGE
X=92
Y=67
W=28
H=28
LeftMouseUpAction=#Client#
RightMouseDownAction=!RainmeterRefresh
MouseActionCursor=1

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXSR.png
X=130
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=130
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[Set]
Meter=BUTTON
ButtonImage=#@#img\Settings.png
X=130
Y=21
ButtonCommand=!Execute ["#SKINSPATH#Vista Rainbar\Mail\MailConfig.exe"]
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=130
Y=42
ButtonCommand=!ActivateConfig "Vista Rainbar\Mail\Gmail" "2.ini"
Hidden=1
