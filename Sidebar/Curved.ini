[Metadata]
Name=Sidebar | Curved
Config=Vista Rainbar | Sidebar
Description=A sidebar.
Version=5.0
Tags=Vista Rainbar | Sidebar
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com


[Background]
Meter=image
ImageName=curved.png
W=150
H=#SCREENAREAHEIGHT#

[Menu]
Meter=IMAGE
ImageName=Menu.png
X=60
Y=6

[Plus]
Meter=BUTTON
ButtonImage=PlusButton.png
X=70
Y=10
ButtonCommand=!execute ["#@#\WinFormsApp1.exe" --beta1 true --gadgets beta1.xml]

[More]
Meter=BUTTON
ButtonImage=MoreButton.png
X=100
Y=10
ButtonCommand=!ActivateConfig "Vista Rainbar\Sidebar" "Clear.ini"

[More2]
Meter=BUTTON
ButtonImage=MoreButton2.png
X=120
Y=10
ButtonCommand=!ActivateConfig "Vista Rainbar\Sidebar" "Diamond.ini"
