[Metadata]
Name=Sidebar | Fade
Config=Vista Rainbar | Sidebar
Description=The default sidebar.
Version=5.0
Tags=Vista Rainbar | Sidebar
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com


[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=Gavatx (gavatx.deviantart.com)
AppVersion=1.0
BackgroundMode=0
MouseOverAction=!execute [!ShowMeter Background2][!Redraw]
MouseLeaveAction=!execute [!HideMeter Background2][!Redraw]

[Background]
Meter=image
ImageName=fade.png
W=150
H=#SCREENAREAHEIGHT#

[Background2]
Meter=image
ImageName=transparent.png
W=150
H=#SCREENAREAHEIGHT#
Hidden=1

[Menu]
Meter=IMAGE
ImageName=Menu.png
X=60
Y=6

[Plus]
Meter=BUTTON
ButtonImage=PlusButton.png
X=70
Y=10
ButtonCommand=!execute ["#@#\WinFormsApp1.exe"]

[More]
Meter=BUTTON
ButtonImage=MoreButton.png
X=100
Y=10
ButtonCommand=!ActivateConfig "Vista Rainbar\Sidebar" "Diamond.ini"

[More2]
Meter=BUTTON
ButtonImage=MoreButton2.png
X=120
Y=10
ButtonCommand=!ActivateConfig "Vista Rainbar\Sidebar" "Fresh.ini"
