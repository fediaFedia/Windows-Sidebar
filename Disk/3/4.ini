[Metadata]
Name=Disk Gadget (3) | Style 4
Config=Vista Rainbar | Disk | 3
Description=Displays the usage of disk.
Version=5.0
Tags=Gadget | Vista Rainbar | Disk
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
Update=10000
MouseActionCursor=0
Author=legace@inbox.com

Background=..\img\Disque3.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]

[Variables]
Disk3=E:
NumOfDec=0
@Include=..\settings.inc
FontName=Segoe UI
TxtColor=255,255,255
Shw_Color=0,0,0
UpdateRate=14400

[MeasureDiskFree]
Measure=FreeDiskSpace
Drive=#Disk3#
Substitute="G":"GB","M":"MB","K":"KB"

[MeasureDiskUsed]
Measure=FreeDiskSpace
Drive=#Disk3#
InvertMeasure=1
Substitute="G":"GB","M":"MB","K":"KB"

[MeasureDiskTotal]
Measure=FreeDiskSpace
Drive=#Disk3#
Total=1
Substitute="G":"GB"

###


[DiskTotalBar]
MeasureName=MeasureDiskTotal
Meter=BAR
X=17
Y=50
H=7
W=110
BarImage=..\img\White.png
BarOrientation=HORIZONTAL

[DiskFreeBar]
MeasureName=MeasureDiskUsed
Meter=BAR
X=17
Y=50
H=7
W=110
BarImage=..\img\Blue.png
BarOrientation=HORIZONTAL

[TxtShw]
Meter=STRING
X=15
Y=4
FontColor=#Shw_Color#
StringStyle=NORMAL
FontSize=9
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
Text=#Disk3#

[Txt]
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=NORMAL
FontSize=9
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text=#Disk3#

[Clic]
Meter=IMAGE
X=15
Y=4
W=16
H=16
LeftMouseUpAction=#Disk3#
RightMouseDownAction=!execute ["explorer.exe /root,,#Disk3#"]

[TotalShw]
MeasureName=MeasureDiskTotal
Meter=STRING
X=130
Y=6
FontColor=#Shw_Color#
StringStyle=NORMAL
FontSize=8
StringAlign=RIGHT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#

[Total]
MeasureName=MeasureDiskTotal
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=NORMAL
FontSize=8
StringAlign=RIGHT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#

[UsedShw]
MeasureName=MeasureDiskUsed
Meter=STRING
X=16
Y=23
FontColor=#Shw_Color#
StringStyle=NORMAL
FontSize=8
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text=Used %1
NumofDecimals=#NumOfDec#

[Used]
MeasureName=MeasureDiskUsed
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=NORMAL
FontSize=8
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
Text=Used %1
NumofDecimals=#NumOfDec#

[FreeShw]
MeasureName=MeasureDiskFree
Meter=STRING
X=16
Y=36
FontColor=#Shw_Color#
StringStyle=NORMAL
FontSize=8
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text=Free %1

[Free]
MeasureName=MeasureDiskFree
Meter=STRING
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=NORMAL
FontSize=8
StringAlign=LEFT
FontFace=#FontName#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text=Free %1

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=139
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=139
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=139
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Disk\3" "5.ini"
Hidden=1
