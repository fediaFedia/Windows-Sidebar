[Metadata]
Name=Disk Gadget (2) | Style 3
Config=Vista Rainbar | Disk | 2
Description=Displays the usage of disk.
Version=5.0
Tags=Gadget | Vista Rainbar | Disk
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
Update=10000
MouseActionCursor=0
Author=legace@inbox.com

Background=..\img\Disque.png
[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=150
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]

[Variables]
Disk2=D:
NumOfDec=0
@Include=..\settings.inc
FontName2=Microsoft Sans Serif
TxtColor=255,255,255,225
Shw_Color=0,0,0,200
UpdateRate=14400

[MeasureDiskFree]
Measure=FreeDiskSpace
Drive=#Disk2#
Substitute="G":"GB","M":"MB","K":"KB"

[MeasureDiskUsed]
Measure=FreeDiskSpace
Drive=#Disk2#
InvertMeasure=1
Substitute="G":"GB","M":"MB","K":"KB"

[MeasureDiskTotal]
Measure=FreeDiskSpace
Drive=#Disk2#
Total=1
Substitute="G":"GB"

###

[DiskTotalBar]
MeasureName=MeasureDiskTotal
Meter=BAR
X=16
Y=53
H=5
W=114
BarColor=255,255,255,155
BarOrientation=HORIZONTAL

[DiskFreeBar]
MeasureName=MeasureDiskUsed
Meter=BAR
X=16
Y=53
H=5
W=114
BarImage=..\img\Bar.png
BarOrientation=HORIZONTAL

[DiskFree]
Meter=STRING
MeasureName=MeasureDiskFree
X=132
Y=22
FontColor=#Shw_Color#
StringStyle=Bold
FontSize=8
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text="Free %1"

[DiskFree2]
Meter=STRING
MeasureName=MeasureDiskFree
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=Bold
FontSize=8
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text="Free %1"

[DiskUsed]
Meter=STRING
MeasureName=MeasureDiskUsed
X=132
Y=36
FontColor=#Shw_Color#
StringStyle=Bold
FontSize=8
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text="Used %1"

[DiskUsed2]
Meter=STRING
MeasureName=MeasureDiskUsed
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=Bold
FontSize=8
StringAlign=right
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Text="Used %1"

[DiskTotal.txt]
Meter=STRING
MeasureName=MeasureDiskTotal
X=132
Y=8
FontColor=#Shw_Color#
StringStyle=BOLD
FontSize=8
StringAlign=RIGHT
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Prefix="#Disk2#  "

[DiskTotal.txt2]
Meter=STRING
MeasureName=MeasureDiskTotal
X=1r
Y=-1r
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=8
StringAlign=RIGHT
FontFace=#FontName2#
AntiAlias=1
AutoScale=1
NumofDecimals=#NumOfDec#
Prefix="#Disk2#  "

[HDDIcon]
Meter=BUTTON
ButtonImage=#@#img\HDD1Button.png
X=0
Y=-30
ButtonCommand=!Execute [#Disk2#]

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=139
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=139
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=139
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Disk\2" "4.ini"
Hidden=1