[Metadata]
Name=CPU Meter | Style 1+
Config=Vista Rainbar | CPU Meter
Description=Displays the CPU and RAM usage.
Version=5.0
Tags=Gadget | Vista Rainbar | CPU | RAM | System
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com


[imge]
Meter=IMAGE
ImageName=CPUMeterL.png


[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=215
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Minus][!ShowMeter More][!ShowMeter Back][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Minus][!HideMeter More][!HideMeter Back][!HideMeter Close][!Redraw]

[Variables]
FontName=Calibri
TxtColor=255,255,255,235
Shw_Color=0,0,0,200
AntiAlias=1

###

[MeasureCPU]
Measure=CPU

###

[CPU]
MeasureName=MeasureCPU
Meter=ROTATOR
X=70
Y=82
ImageName=RotatorL.png
StartAngle=1
RotationAngle=4.2832
OffsetX=5
OffsetY=49

[CPU2]
MeasureName=MeasureCPU
Meter=STRING
X=53
Y=106
FontColor=#TxtColor#
StringStyle=BOLD
FontSize=10
StringAlign=LEFT
FontFace=#FontName#
Postfix="%"
AntiAlias=1

---
[MeasurePhysUsed]
Measure=PhysicalMemory


[UsedPhysMemBar]
MeasureName=MeasurePhysUsed
Meter=ROTATOR
X=145
Y=50
ImageName=RotatorRAML.png
StartAngle=1
RotationAngle=4.2832
OffsetX=5
OffsetY=35

[PhysMemUsed]
Meter=string
MeasureName=MeasurePhysUsed
X=142
Y=64
FontColor=#TxtColor#
StringStyle=bold
FontSize=10
StringAlign=CENTER
FontFace=#FontName#
AntiAlias=1
Postfix="%"
AutoScale=1
Percentual=1

---
[Round]
Meter=IMAGE
ImageName=CerclesL.png
X=1
Y=-1

---
[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXM.png
X=194
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=194
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[Minus]
Meter=BUTTON
ButtonImage=#@#img\Minus.png
X=194
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\CPU Meter" "1.ini"
Hidden=1

