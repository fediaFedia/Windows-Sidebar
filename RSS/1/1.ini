[Metadata]
Name=RSS Gadget #1 | Feeds | Style 1
Config=Vista Rainbar | Feeds | RSS | Feeds | 1
Description=Displays the latest items from any RSS or Atom feed.
Instructions=Use the configuration tool to change your feed URL.
Version=5.0
Tags=Gadget | Feeds | Vista Rainbar | Feeds | RSS | Feeds | Feed
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
Author=legace@inbox.com

Update=60000


[img]
Meter=IMAGE
w=130
h=173
ImageName=..\img\Bkg.png
MouseActionCursor=0

[Solid]
