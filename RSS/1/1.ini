solidcolor=0,255,0,1
w=140
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter Close][!ShowMeter Set][!ShowMeter Plus][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter Close][!HideMeter Set][!HideMeter Plus][!Redraw]

[Variables]

Substitute="":"","^\s+":"","<!\[CDATA\[":"","\]\]>":"","!\[CDATA\[":"","\]\]":""
get=<item>.*<title>(.*)</title>.*<link>(.*)</link>.*</item>.*
@Include=UserVariables.inc
FontName=Segoe UI
FontName2=Calibri
TxtColor=255,255,255
TxtColor2=255,255,255,120
ShwColor=0,0,0,100
HideHint=0


Item=(?(?=.*<item>).*<item>.*<title>(.*)</title>.*<link>(.*)</link>.*<pubDate>(.*)</pubDate>)
Sub="^\s+":"","<!\[CDATA\[":"","\]\]>":"","!\[CDATA\[":"","\]\]":""

LastCat=1


[JustDoIt]
Measure=Calc
Formula=1
IfCondition=1=1
IfTrueAction=[!HideMeterGroup Feeds][!ShowMeterGroup #LastCat#][!Update][!Redraw]
DynamicVariables=1


