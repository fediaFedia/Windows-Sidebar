[Metadata]
Name=Power Gadget | Style 2
Config=Vista Rainbar | Power
Description=A gadget to shutdown, reboot, or sleep your computer.
Version=5.0
Tags=Gadget | Vista Rainbar | System | Power
License=Creative Commons Attribution-Noncommercial-No Derivative Works 3.0
Preview=#SKINSPATH#Vista Rainbar\img\Preview.png

[Rainmeter]
Group=Gadget | Vista Rainbar
MiddleMouseUpAction=!DeactivateConfig
MouseActionCursor=0
Author=legace@inbox.com



[img]
Meter=IMAGE

imagename=Background2.png


[Solid]
Meter=STRING
solidcolor=0,0,0,1
w=137
h=150
MouseOverAction=!execute [!ShowMeter Menu][!ShowMeter More][!ShowMeter Close][!Redraw]
MouseLeaveAction=!execute [!HideMeter Menu][!HideMeter More][!HideMeter Close][!Redraw]



[Variables]
FontName=Segoe UI
TxtColor=220,220,220
ShwColor=0,0,0

Action1='"#ADDONSPATH#nircmd\nircmd.exe" hibernate'
Action2='"#ADDONSPATH#nircmd\nircmd.exe" exitwin reboot'
Action3='"#ADDONSPATH#nircmd\nircmd.exe" exitwin poweroff'

###

[MeterButton1]
Meter=BUTTON
ButtonImage=sleepbutton.png
X=8
Y=6
ButtonCommand=!Execute [#Action1#]

[MeterButton2]
Meter=BUTTON
ButtonImage=restartbutton.png
X=49
Y=6
ButtonCommand=!Execute [#Action2#]

[MeterButton3]
Meter=BUTTON
ButtonImage=shutdownbutton.png
X=90
Y=6
ButtonCommand=!Execute [#Action3#]

###

[Menu]
Meter=IMAGE
ImageName=#@#img\MenuXR.png
X=118
Y=0
Hidden=1

[Close]
Meter=BUTTON
ButtonImage=#@#img\Close.png
X=118
Y=0
ButtonCommand=!RainmeterDeactivateConfig
Hidden=1

[More]
Meter=BUTTON
ButtonImage=#@#img\More.png
X=118
Y=21
ButtonCommand=!ActivateConfig "Vista Rainbar\Power" "3.ini"
Hidden=1
